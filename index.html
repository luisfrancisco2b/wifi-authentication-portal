<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tela de Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/app.js" defer></script>
</head>

<body>
  <main class="containerLogin">
    <img src="img/FATEPI-FAESPI-2-2.png" alt="Logo" width="100" height="100" />
    <h2>Rede FATEPI/FAESPI</h2>

    <form>
      <!-- Matrícula -->
      <label class="label">Matrícula</label>
      <input placeholder="Matrícula" name="auth_user" id="matricula" type="text" />

      <!-- CPF -->
      <label class="label">CPF</label>
      <div class="campo-senha">
        <input placeholder="CPF" name="auth_pass" id="cpf" type="password" />

        <button type="button" id="btn-toggle-senha" class="btn-toggle">
          Mostrar CPF
        </button>
      </div>

      <!-- <input name="redirurl" type="hidden" value="$PORTAL_REDIRURL$" />
      <input name="zone" type="hidden" value="$PORTAL_ZONE$" /> -->
      <button type="submit" name="accept" id="btn-continue" class="btn-submit">
        <span id="btn-text">Continue</span>
        <div id="spinner" class="spinner class-hidden"></div>
      </button>
    </form>
  </main>

  <!-- method="post" action="$PORTAL_ACTION$" -->
</body>

</html>
